upstream point_backend {
    server point-service-1:8084;
    server point-service-2:8084;
    server point-service-3:8084;
    server point-service-4:8084;
    server point-service-5:8084;
    server point-service-6:8084;
}

server {
    listen 8090;

    location / {
        proxy_pass http://point_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}